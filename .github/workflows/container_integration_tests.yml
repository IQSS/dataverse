name: Container Integration Tests Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - master
    paths-ignore:
      - "doc/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/*.md"
  pull_request:
    branches:
      - develop
      - master
    paths-ignore:
      - "doc/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/*.md"

concurrency:
  group: "container-integration-tests-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  main-integration-tests-workflow:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Docker
        run: |
          set -euo pipefail
          docker version

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Verify Maven
        run: |
          set -euo pipefail
          mvn -version

      - name: Clean docker-dev-volumes
        run: |
          set -euo pipefail
          rm -rf docker-dev-volumes || true

      - name: Build Dataverse containers via Maven
        run: |
          set -euo pipefail
          mvn jacoco:prepare-agent clean package -Pct \
            -Djacoco.append=true \
            -DskipUnitTests=false \
            -Dmaven.test.failure.ignore=true

      - name: Download JaCoCo agent
        run: |
          set -euo pipefail
          mkdir -p jacoco
          curl -Ls https://repo1.maven.org/maven2/org/jacoco/org.jacoco.agent/0.8.11/org.jacoco.agent-0.8.11-runtime.jar \
            -o jacoco/jacocoagent.jar

      - name: Start Dataverse stack
        run: |
          set -euo pipefail
          mvn -Pct docker:start \
            -Ddataverse.cors.origin=* \
            -Ddataverse.cors.methods=GET,POST,PUT,DELETE,OPTIONS \
            -Ddataverse.cors.headers.allow=range,content-type,x-dataverse-key,accept \
            -Ddataverse.cors.headers.expose=content-encoding,content-range,accept-ranges \
            -Ddataverse.feature.index-harvested-metadata-source=true \
            -Ddataverse.oai.server.maxidentifiers=2 \
            -Ddataverse.oai.server.maxrecords=2

      - name: Wait for Dataverse API readiness
        run: |
          set -euo pipefail
          URL="http://localhost:8080/api/info/version"
          MAX_ATTEMPTS=10
          SLEEP_TIME=15
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            RESPONSE=$(curl -s --max-time 15 "$URL" || true)
            STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null || echo "NOT_READY")
            if [ "$STATUS" = "OK" ]; then
              sleep 30
              exit 0
            fi
            sleep $SLEEP_TIME
            if [ $SLEEP_TIME -lt 60 ]; then
              SLEEP_TIME=$((SLEEP_TIME * 2))
              [ $SLEEP_TIME -gt 60 ] && SLEEP_TIME=60
            fi
          done
          echo "Dataverse failed to become ready"
          docker ps
          exit 1

      - name: Map localstack to localhost for Maven tests
        run: echo "127.0.0.1 localstack" | sudo tee -a /etc/hosts

      - name: Configure Dataverse API Settings
        run: |
          set -euo pipefail
          declare -A settings=(
            [":BuiltinUsersKey"]="burrito"
            [":ProvCollectionEnabled"]="true"
            [":AllowApiTokenLookupViaApi"]="true"
            [":AllowSignUp"]="true"
          )
          for key in "${!settings[@]}"; do
            docker exec dev_dataverse curl --fail-with-body -sS -X PUT -d "${settings[$key]}" \
              "http://localhost:8080/api/admin/settings/$key"
          done

      - name: Put SUSHI config file in place
        run: |
          set -euo pipefail
          SOURCE_FILE="${{ github.workspace }}/src/test/java/edu/harvard/iq/dataverse/makedatacount/sushi_sample_logs.json"
          docker exec -i dev_dataverse sh -c "cat > /tmp/sushi_sample_logs.json" < "$SOURCE_FILE"

      - name: Run Maven Integration Tests
        env:
          DVAPIKEY: "burrito"
        run: |
          set -euo pipefail
          TEST_SUITE=$(cat tests/integration-tests.txt)
          mvn jacoco:prepare-agent test \
            -Djacoco.append=true \
            -Dtest="$TEST_SUITE" \
            -Dmaven.test.failure.ignore=true \
            -Ddataverse.test.baseurl=http://localhost:8080

      # 🔴 STOP CONTAINERS FIRST (flush JaCoCo)
      - name: Stop Dataverse stack
        if: always()
        run: |
          set -euo pipefail
          mvn -Pct docker:stop || true

      # ✅ SCRAPE AFTER STOP (using docker cp)
      - name: Scrape and Merge JaCoCo Coverage
        if: always()
        run: |
          set -euo pipefail

          mkdir -p target/all-execs

          echo "Copying JaCoCo exec from container..."
          docker cp dev_dataverse:/tmp/jacoco-it.exec target/all-execs/jacoco-it.exec || true

          echo "Collecting runner-side exec files..."
          find target -name "jacoco*.exec" -not -path "target/all-execs/*" \
            -exec cp {} target/all-execs/ \; || true

          if ! compgen -G "target/all-execs/*.exec" > /dev/null; then
            echo "No exec files found"
            exit 0
          fi

          curl -Ls https://repo1.maven.org/maven2/org/jacoco/org.jacoco.cli/0.8.11/org.jacoco.cli-0.8.11-nodeps.jar \
            -o jacococli.jar

          java -jar jacococli.jar merge target/all-execs/*.exec \
            --destfile target/jacoco-merged.exec

          java -jar jacococli.jar report target/jacoco-merged.exec \
            --classfiles target/classes \
            --sourcefiles src/main/java \
            --html target/site/jacoco-merged-report \
            --xml target/site/jacoco-merged-report/jacoco.xml

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco*/
          retention-days: 14

      - name: Check for Test Failures
        if: always()
        run: |
          if grep -q "<failure" target/surefire-reports/*.xml target/failsafe-reports/*.xml 2>/dev/null; then
            exit 1
          fi

      - name: Final Docker cleanup
        if: always()
        run: docker system prune -af || true
