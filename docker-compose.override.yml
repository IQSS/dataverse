version: "2.4"

# Local development overrides for docker-compose-dev.yml
# This file is used by the fast-redeploy scripts (dev-start-frd.sh, dev-down-frd.sh)
# and can be used manually with: docker compose -f docker-compose-dev.yml -f docker-compose.override.yml up

services:
  dev_dataverse:
    # Remove memory limits for local development
    # (upstream has 2GB limit for GitHub Actions CI, which is too restrictive for local dev)
    mem_limit: 0
    mem_reservation: 0
